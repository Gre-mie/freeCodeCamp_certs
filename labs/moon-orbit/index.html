<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Moon Orbit</title>
    <link rel="stylesheet" href="./styles.css" >
</head>
<body>
 <div class="space">

      <div class="earth">
        <div class="land">
          <div class="landmass l1"></div>
          <div class="landmass l2"></div>
          <div class="landmass l3"></div>
          <div class="landmass l4"></div>
          <div class="landmass l5"></div>
        </div>
        <div class="light large-pillow-shadow"></div>
      </div>

      <div class="orbit">
        <div class="moon"> 
          <div class="light small-pillow-shadow"></div>
        </div>
      </div>

      <div class="stars-container">
        <div class="star s1"></div>
        <div class="star s2"></div>
        <div class="star s3"></div>
        <div class="star s4"></div>
        <div class="star s5"></div>
        <div class="star s6"></div>
        <div class="star s7"></div>
      </div>
    </div>
</body>
</html>
